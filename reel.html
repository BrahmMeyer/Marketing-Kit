<script>
const id = new URLSearchParams(window.location.search).get('id');
const TOKEN = 'patL3Q58sft42r9m6.edd9d972648dafe2db31136bfa425eb0b6e3399af91b05ab6a4a976c9bea24c9';
const BASE = 'appWx9LdS0uWdrRzL';
const TABLE = 'tblvUjEhTTiZU0pcI'; 

async function load() {
    if (!id) { document.getElementById('loaderText').innerText = "NO ID PROVIDED"; return; }
    
    // CHANGED: {formId} with a capital 'I' to match your Airtable column
    const formula = encodeURIComponent(`{formId}="${id.trim()}"`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;
    
    try {
        const res = await fetch(url, { 
            headers: { 'Authorization': `Bearer ${TOKEN}` } 
        });
        
        const data = await res.json();

        if (!res.ok) {
            document.getElementById('loaderText').innerText = "SYSTEM ERROR";
            document.getElementById('errorLog').innerText = data.error.message;
            document.getElementById('errorLog').style.display = 'block';
            return;
        }

        if (!data.records || data.records.length === 0) {
            document.getElementById('loaderText').innerText = "STILL GENERATING...";
            return;
        }

        // Get the latest record only
        const record = data.records.reverse().find(r => r.fields['Video URL']);
        
        if (!record || !record.fields['Video URL']) {
            document.getElementById('loaderText').innerText = "VIDEO NOT READY";
            return;
        }

        const f = record.fields;
        document.getElementById('bizName').innerText = (f['Charter Name'] || "YOUR REEL").toUpperCase();
        document.getElementById('video').src = f['Video URL'];
        document.getElementById('video').load();

        if (f['Review']) {
            const reviewUrl = Array.isArray(f['Review']) ? f['Review'][0] : f['Review'];
            document.getElementById('reviewBtn').href = reviewUrl;
            document.getElementById('reviewBtn').style.display = 'block';
        }

        document.getElementById('shareBtn').href = `send.html?id=${id}`;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
    } catch (err) {
        document.getElementById('loaderText').innerText = "CONNECTION ERROR";
    }
}

function downloadVideo() {
    let url = document.getElementById('video').src;
    if (url.includes('cloudinary')) url = url.replace('/upload/', '/upload/fl_attachment/');
    window.open(url, '_blank');
}
load();
</script>
