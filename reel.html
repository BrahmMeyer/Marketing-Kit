<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing Reel</title>

<style>
body {
    margin:0;
    background:#080808;
    color:#fff;
    font-family:Arial, sans-serif;
    text-align:center;
}

.container {
    max-width:500px;
    margin:auto;
    padding:20px;
}

.video-wrap video {
    width:100%;
    border-radius:20px;
}

/* PRICE COLOR UPDATED */
.price {
    font-size:28px;
    font-weight:bold;
    color:#b3b3b3;
    margin:20px 0;
}

.stats {
    background:#111;
    padding:20px;
    border-radius:16px;
    border:1px solid #1a1a1a;
}

.stats-grid {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:15px;
}

.stat-box {
    text-align:center;
}

.stat-title {
    font-size:10px;
    color:#777;
    text-transform:uppercase;
}

.stat-value {
    font-size:16px;
    font-weight:bold;
}

/* SPECIAL FEATURES INSIDE SAME BLOCK */
.features {
    margin-top:20px;
    text-align:center;
}

.features h3 {
    font-size:12px;
    letter-spacing:2px;
    color:#888;
    margin-bottom:10px;
}

.features p {
    font-size:14px;
    color:#ddd;
}

/* AGENT PHOTO BIGGER */
.agent {
    margin-top:30px;
}

.agent img {
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #222;
}

.owner {
    margin-top:10px;
    font-size:14px;
    color:#ccc;
}

/* BUTTON */
.btn {
    display:block;
    margin:25px auto;
    padding:16px;
    width:100%;
    border-radius:10px;
    background:#fff;
    color:#0A5C1A;
    font-weight:bold;
    text-decoration:none;
}

/* FOOTER */
.footer {
    margin-top:40px;
    font-size:10px;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

    <div class="video-wrap">
        <video src="" controls></video>
    </div>

    <div class="price">{{price}}</div>

    <!-- MERGED BLOCK -->
    <div class="stats">

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-title">Acres</div>
                <div class="stat-value">{{acres}}</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">Sq Footage</div>
                <div class="stat-value">{{sqft}}</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">Bedrooms</div>
                <div class="stat-value">{{beds}}</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">Bathrooms</div>
                <div class="stat-value">{{baths}}</div>
            </div>
        </div>

        <!-- SPECIAL FEATURES INSIDE -->
        <div class="features">
            <h3>SPECIAL FEATURES</h3>
            <p>{{features}}</p>
        </div>

    </div>

    <!-- AGENT SECTION -->
    <div class="agent">
        <img src="{{photo}}" alt="Agent Photo">
        <div class="owner">{{Owner}}</div>
    </div>

    <!-- UPDATED BUTTON TEXT -->
    <a href="#" class="btn">SAVE LISTING</a>

    <!-- UPDATED FOOTER -->
    <div class="footer">
        POWERED BY ROD2REEL<br>
        +27 (0)68 364 4061
    </div>

</div>

</body>
</html>
