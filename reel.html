<script>
// Your specific Google Sheets CSV Publication Link
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTHYc7IDeoKNO2A56pEnCJX13WQQbveV8wnQk4Uv-4kEk7A-1V7xNnQHbqjcwlf0uJRQ3J1W7cTGdCh/pub?output=csv';

async function loadReel() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    if (!id) {
        document.getElementById('loader').innerText = "❌ ERROR: NO ID FOUND";
        return;
    }

    try {
        // Cache Buster added to end of URL to ensure fresh data
        const response = await fetch(CSV_URL + '&cachebust=' + Date.now());
        const csvText = await response.text();
        
        const rows = csvText.split('\n').map(row => {
            return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
        });

        const record = rows.reverse().find(r => r[0] === id);

        if (record && record[6]) { // Column G
            const businessName = record[2] || "YOUR REEL"; 
            const videoUrl = record[6];

            document.getElementById('bizName').innerText = businessName.toUpperCase();
            document.getElementById('video').src = videoUrl;
            
            let downloadUrl = videoUrl;
            if (downloadUrl.includes('cloudinary')) {
                downloadUrl = downloadUrl.replace('/upload/', '/upload/fl_attachment/');
            }
            document.getElementById('dlBtn').href = downloadUrl;
            document.getElementById('shareBtn').href = `send.html?id=${id}`;

            document.getElementById('loader').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
        } else {
            document.getElementById('loader').innerHTML = "🎥 REEL IS STILL RENDERING...<br><br><small>Please refresh this page in about 60 seconds.</small>";
        }
    } catch (error) {
        console.error("Fetch error:", error);
        document.getElementById('loader').innerText = "⚠️ CONNECTION ERROR: PLEASE REFRESH";
    }
}
loadReel();
</script>
