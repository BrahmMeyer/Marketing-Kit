<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Your Reel is Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy:#0A192F; --pearl:#FDFBF7; --accent:#E2E8F0; --gold:#F5A623; }
        body { background: var(--pearl); color: var(--navy); font-family: 'DM Sans', sans-serif; text-align: center; margin: 0; }
        #loader { height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--navy); font-weight: bold; }
        #main { display: none; padding: 40px 20px; }
        .biz-name { font-size: 28px; font-weight: 700; color: var(--navy); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .container { max-width: 450px; margin: auto; }
        .video-wrap { border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(10,25,47,0.1); margin-bottom: 25px; background: #000; line-height: 0; }
        video { width: 100%; display: block; }
        
        /* New Caption Box */
        #captionBox { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 20px; text-align: left; display: none; }
        .caption-label { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 700; }
        #captionText { font-size: 15px; line-height: 1.5; color: var(--navy); }

        .btn { width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 14px; margin-bottom: 12px; cursor: pointer; text-decoration: none; display: inline-block; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        #reviewBtn { background: var(--navy); color: #fff; border: none; }
        .btn-secondary { background: transparent; color: var(--navy); border: 2px solid var(--navy); }
        
        #bizLogo { max-height: 120px; max-width: 80%; margin: 30px auto; display: none; }
        .footer-main { font-size: 10px; color: #94A3B8; letter-spacing: 2px; font-weight: 700; margin-top: 20px; }
    </style>
</head>
<body>

<div id="loader">GENERATING EXPERIENCE...</div>

<div id="main">
    <div id="bizName" class="biz-name">ROD2REEL</div>
    <div class="container">
        <div class="video-wrap">
            <video id="video" controls playsinline></video>
        </div>

        <div id="captionBox">
            <div class="caption-label">Project Details</div>
            <div id="captionText"></div>
        </div>

        <a id="reviewBtn" class="btn" style="display:none;">Leave A Review</a>
        <button class="btn btn-secondary" onclick="downloadVideo()">Download Reel</button>
        <img id="bizLogo" alt="Logo">
        <div class="footer-main">POWERED BY ROD2REEL</div>
    </div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');
const TOKEN = 'patODjpFQhnsR92tl.5c80e0baa73a4b2099a83fead58c6cf8ac9811041b7077f031f95d5db82e8430';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblCYkMaAOHrX0nwN';

async function load() {
    if (!id) return;
    try {
        // FIXED FORMULA: Looking for "Video ID" to match your Deliveries Table
        const formula = encodeURIComponent(`OR({Video ID}="${id}", {lookupId}="${id}", {formId}="${id}")`);
        const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}&sort[0][field]=Created&sort[0][direction]=desc`;
        
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const data = await res.json();
        if (!data.records || data.records.length === 0) {
            console.error("No record found");
            return;
        }

        const f = data.records[0].fields;
        
        // Business Name Mapping (Checks both potential column names)
        let name = f['Business Name'] || f['Charter Name'] || "ROD2REEL";
        document.getElementById('bizName').innerText = name.toUpperCase();
        
        // Video Logic
        document.getElementById('video').src = (f['Video URL'] || "") + "?t=" + new Date().getTime();

        // New Caption Logic
        if (f['Caption']) {
            document.getElementById('captionText').innerText = f['Caption'];
            document.getElementById('captionBox').style.display = 'block';
        }

        // Logo Logic
        const logoData = f['Logo'];
        if (logoData) {
            const logoImg = document.getElementById('bizLogo');
            logoImg.src = Array.isArray(logoData) ? logoData[0].url : logoData;
            logoImg.onload = () => { logoImg.style.display = 'block'; };
        }

        // Review Logic
        if (f['Review']) {
            document.getElementById('reviewBtn').href = f['Review'];
            document.getElementById('reviewBtn').style.display = 'block';
        }

        document.getElementById('loader').style.display = 'none';
        document.getElementById('main').style.display = 'block';
    } catch (e) { console.error(e); }
}

function downloadVideo() { 
    let url = document.getElementById('video').src.split('?')[0];
    if (url && url.includes('cloudinary')) url = url.replace('/upload/', '/upload/fl_attachment/');
    if(url){
        window.open(url, '_blank');
    }
}
load();
</script>
</body>
</html>
