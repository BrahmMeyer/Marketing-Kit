<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Share Your Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy:#0A192F; 
            --pearl:#FDFBF7; 
            --whatsapp: #4A5D4E; 
            --facebook: #3B4A6B; 
            --instagram: #8C6A5E; 
            --x-corp: #2C2C2C; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--pearl); font-family: 'DM Sans', sans-serif; text-align: center; padding: 40px 20px; color: var(--navy); }
        h2 { font-size: 18px; text-transform: uppercase; margin-bottom: 25px; font-weight: 900; letter-spacing: 2px; }
        .button-stack { width: 100%; max-width: 320px; margin: auto; display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; padding: 16px; border-radius: 10px; cursor: pointer; border: none; font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #fff; display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; }
        
        /* The NEW Native Share Button Color */
        .btn-native { background: var(--navy); box-shadow: 0 4px 15px rgba(10, 25, 47, 0.2); }
        
        .btn-wa { background: var(--whatsapp); }
        .btn-ig { background: var(--instagram); }
        .footer { margin-top: 50px; font-size: 8px; opacity: 0.4; letter-spacing: 3px; font-weight: 700; }
        svg { width: 18px; height: 18px; fill: #fff; }
    </style>
</head>
<body>

    <h2>Share Your Experience</h2>

    <div class="button-stack">
        <button class="btn btn-native" onclick="shareVideoNative()">
            <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
            Share Video to Socials
        </button>

        <button class="btn btn-wa" onclick="shareWhatsApp()">WhatsApp Contact</button>
        <button class="btn btn-ig" onclick="saveForInstagram()">Save to Gallery</button>
    </div>

    <div class="footer">ROD2REEL</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');
const TOKEN = 'patcg5qiA5GY0C9dG.99f8e22ce623b22372b0654d341ee3d6164160d11e591f28d7d4d26b76ea2589';
const BASE = 'appMDAS9DBPWtBiYZ';
const TABLE = 'tblvqMOioHwGPLIik';

async function fetchVideoData() {
    const cleanId = id.split(' ')[0].trim();
    const formula = encodeURIComponent(`{ID}="${cleanId}"`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    const data = await res.json();
    return data.records && data.records.length > 0 ? data.records[data.records.length - 1].fields : null;
}

// THIS ATTACHES THE VIDEO TO THE POST BOX
async function shareVideoNative() {
    const fields = await fetchVideoData();
    if (!fields || !fields['Video URL']) return alert("Video not found.");

    const videoUrl = fields['Video URL'];
    const response = await fetch(videoUrl);
    const blob = await response.blob();
    const file = new File([blob], "my-reel.mp4", { type: "video/mp4" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
            await navigator.share({
                files: [file],
                title: 'My Highlight Reel',
                text: 'Check out my reel from Rod2Reel!',
            });
        } catch (err) {
            console.error("Share failed", err);
        }
    } else {
        alert("Your browser doesn't support direct video sharing. Use 'Save to Gallery' instead.");
    }
}

function shareWhatsApp() {
    const msg = `Check out my reel: https://delivery.rod2reel.com/reel.html?id=${id}`;
    window.location.href = `whatsapp://send?text=${encodeURIComponent(msg)}`;
}

async function saveForInstagram() {
    const fields = await fetchVideoData();
    if (fields && fields['Video URL']) {
        let vUrl = fields['Video URL'].replace('/upload/', '/upload/fl_attachment/');
        window.open(vUrl, '_blank');
    }
}
</script>
</body>
</html>
