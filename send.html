<script>
const id = new URLSearchParams(window.location.search).get('id');
const reelURL = `https://delivery.rod2reel.com/reel.html?id=${id}`;
const msg = `Check out my highlight reel: ${reelURL}`;

function shareWhatsApp() { 
    window.location.href = `whatsapp://send?text=${encodeURIComponent(msg)}`; 
}

// Update sharing links if the elements exist
if(document.getElementById('fbBtn')) document.getElementById('fbBtn').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(reelURL)}`;
if(document.getElementById('xBtn')) document.getElementById('xBtn').href = `https://x.com/intent/tweet?text=${encodeURIComponent(msg)}`;

async function saveForInstagram() {
    if (!id) return;
    
    const TOKEN = 'patcg5qiA5GY0C9dG.99f8e22ce623b22372b0654d341ee3d6164160d11e591f28d7d4d26b76ea2589';
    const BASE = 'appMDAS9DBPWtBiYZ';
    const TABLE = 'tblvqMOioHwGPLIik';

    const formula = encodeURIComponent(`{ID}="${id}"`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

    try {
        const res = await fetch(url, {
            headers: { Authorization: `Bearer ${TOKEN}` }
        });
        const data = await res.json();

        if (data.records && data.records.length > 0) {
            let videoUrl = data.records[0].fields['Video URL'];
            if (videoUrl) {
                if (videoUrl.includes('cloudinary')) {
                    videoUrl = videoUrl.replace('/upload/', '/upload/fl_attachment/');
                }
                window.open(videoUrl, '_blank');
            }
        } else {
            alert("Video still processing. Please try again in a moment.");
        }
    } catch (err) {
        console.error(err);
    }
}
</script>
