<script>
const id = new URLSearchParams(window.location.search).get('id');
const name = new URLSearchParams(window.location.search).get('name') || "My Stay";

function send(type) {
    const val = document.getElementById('input').value.trim();
    if(!val) return;

    const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const msg = `My stay at ${name} ${link}`;

    let phone = val.replace(/\D/g, '');
    if (phone.startsWith('0') && phone.length === 10) phone = '27' + phone.substring(1);

    if (type === 'wa') {
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else {
        window.location.href = `sms:${phone}?&body=${encodeURIComponent(msg)}`;
    }
}
</script>
